<!DOCTYPE html>
<html>

<head>
<title>Student Database</title>

<style>

body{
font-family:Arial;
background:#111827;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#1f2937;
padding:30px;
border-radius:10px;
width:400px;
margin:auto;
}

input{
padding:10px;
margin:8px;
width:90%;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#3b82f6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#result{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Student Database</h1>

<div class="container">

<h2>Add Student</h2>

<input id="name" placeholder="Name">
<input id="sap" placeholder="SAP ID">
<input id="age" placeholder="Age">
<input id="marks" placeholder="Marks">

<br>

<button onclick="addStudent()">Add Student</button>

<hr>

<h2>Search Student</h2>

<input id="searchSap" placeholder="Enter SAP ID">

<br>

<button onclick="searchStudent()">Search</button>

<div id="result"></div>

</div>

<script>

function addStudent(){

let data={
name:document.getElementById("name").value,
sap:document.getElementById("sap").value,
age:document.getElementById("age").value,
marks:document.getElementById("marks").value
}

fetch("/add_student",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(data=>{
alert(data.message)
})

}

function searchStudent(){

let sap=document.getElementById("searchSap").value

fetch("/get_student/"+sap)
.then(res=>res.json())
.then(data=>{

let result=document.getElementById("result")

if(data.name){

result.innerHTML=
"<p>Name: "+data.name+"</p>"+
"<p>Age: "+data.age+"</p>"+
"<p>Marks: "+data.marks+"</p>"

}
else{

result.innerHTML="<p>Student not found</p>"

}

})

}

</script>

</body>

</html>
